# fly.toml app configuration file generated for switchboard on 2026-01-30T17:55:04+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'claudecord'
primary_region = 'jnb'

[build]

[env]
  ALLOWED_DIRS = '/root/workspace,/root/claudecord-memory'
  AGENT_CWD = '/root/workspace'
  MEMORY_DIR = '/root/claudecord-memory'
  WEBHOOK_PORT = '8080'
  WHATSAPP_DB_PATH = '/root/whatsapp.db'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[deploy]
  strategy = 'immediate'

[[mounts]]
  source = 'claude_config'
  destination = '/root'

[[vm]]
  memory = '2gb'
  cpus = 2
  memory_mb = 2048
